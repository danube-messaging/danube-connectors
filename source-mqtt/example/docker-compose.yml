services:
  # Danube Broker
  danube-broker:
    image: ghcr.io/danube-messaging/danube-broker:latest
    container_name: danube-broker
    restart: on-failure
    ports:
      - "6650:6650"
      - "50051:50051" # Admin API
      - "9040:9040" # Prometheus metrics
    environment:
      - RUST_LOG=danube_broker=info,danube_core=info,openraft=warn
    volumes:
      - ../../example_shared/danube_broker_no_auth.yml:/etc/danube_broker.yml:ro
      - broker_data:/danube-data
    networks:
      - danube-mqtt-network
    command:
      [
        "--config-file",
        "/etc/danube_broker.yml",
        "--broker-addr",
        "0.0.0.0:6650",
        "--admin-addr",
        "0.0.0.0:50051",
        "--raft-addr",
        "0.0.0.0:7650",
        "--prom-exporter",
        "0.0.0.0:9040",
        "--advertised-addr",
        "danube-broker:6650",
      ]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9040/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # MQTT Broker (Eclipse Mosquitto)
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mqtt-example-broker
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    networks:
      - danube-mqtt-network
    healthcheck:
      test:
        [
          "CMD",
          "mosquitto_sub",
          "-t",
          "$$SYS/#",
          "-C",
          "1",
          "-i",
          "healthcheck",
          "-W",
          "3",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # MQTT Source Connector
  mqtt-connector:
    build:
      context: ../../
      dockerfile: source-mqtt/Dockerfile
    container_name: mqtt-example-connector
    depends_on:
      mosquitto:
        condition: service_healthy
      danube-broker:
        condition: service_healthy
    volumes:
      # Mount TOML configuration file
      - ./connector.toml:/etc/connector.toml:ro
      # Mount schema files for validation
      - ./schemas:/etc/schemas:ro
    environment:
      # Required: Path to configuration file
      - CONNECTOR_CONFIG_PATH=/etc/connector.toml

      # Optional: Core Danube overrides (for different environments)
      - DANUBE_SERVICE_URL=http://danube-broker:6650
      - CONNECTOR_NAME=mqtt-source-example

      # Optional: MQTT connection overrides (for different environments)
      # - MQTT_BROKER_HOST=production-mosquitto
      # - MQTT_BROKER_PORT=1883
      # - MQTT_CLIENT_ID=mqtt-prod-connector

      # Optional: Secrets (should NOT be in TOML file)
      # - MQTT_USERNAME=prod_user
      # - MQTT_PASSWORD=secret123

      # Logging configuration
      - RUST_LOG=info,danube_source_mqtt=info
    networks:
      - danube-mqtt-network
    restart: unless-stopped

  # Test Publisher - Simulates IoT devices publishing to MQTT
  mqtt-test-publisher:
    image: eclipse-mosquitto:2
    container_name: mqtt-example-publisher
    depends_on:
      mosquitto:
        condition: service_healthy
    networks:
      - danube-mqtt-network
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "Waiting for MQTT broker to be ready..."
        sleep 5
        echo "Starting to publish test messages (schema-validated)..."
        while true; do
          temp=$$(shuf -i 10-40 -n 1)
          humidity=$$(shuf -i 40-80 -n 1)
          battery=$$(shuf -i 0-100 -n 1)
          signal=$$((40 + RANDOM % 51))
          signal=-$$signal
          ts=$$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          
          # Sensor data matching sensor-data.json schema
          /usr/bin/mosquitto_pub -h mosquitto -t sensors/temp/zone1 -m "{\"device_id\":\"sensor-temp-001\",\"sensor_type\":\"temperature\",\"value\":$$temp,\"unit\":\"celsius\",\"timestamp\":\"$$ts\",\"battery_level\":$$battery}"
          /usr/bin/mosquitto_pub -h mosquitto -t sensors/humidity/zone1 -m "{\"device_id\":\"sensor-hum-001\",\"sensor_type\":\"humidity\",\"value\":$$humidity,\"unit\":\"percent\",\"timestamp\":\"$$ts\",\"signal_strength\":$$signal}"
          
          # Device status matching device-status.json schema
          /usr/bin/mosquitto_pub -h mosquitto -t devices/device001/telemetry -m "{\"device_id\":\"device001\",\"status\":\"online\",\"battery_level\":$$battery,\"uptime_seconds\":$$RANDOM,\"last_seen\":\"$$ts\",\"firmware_version\":\"1.2.3\"}"
          
          # Debug log (string schema - any text)
          /usr/bin/mosquitto_pub -h mosquitto -t debug/app -m "Debug: System running normally, battery: $$battery%"
          
          echo "[Publisher] Published 4 messages at $$(date +%T) - Schema-validated"
          sleep 5
        done

networks:
  danube-mqtt-network:
    driver: bridge

volumes:
  broker_data:
