services:
  # Danube Broker
  danube-broker:
    image: ghcr.io/danube-messaging/danube-broker:latest
    container_name: danube-broker
    restart: on-failure
    ports:
      - "6650:6650" # Danube service port
      - "50051:50051" # Admin API
      - "9040:9040" # Prometheus metrics
    environment:
      - RUST_LOG=danube_broker=info,danube_core=info,openraft=warn
    volumes:
      - ../../example_shared/danube_broker_no_auth.yml:/etc/danube_broker.yml:ro
      - broker_data:/danube-data
    networks:
      - qdrant-network
    command:
      [
        "--config-file",
        "/etc/danube_broker.yml",
        "--broker-addr",
        "0.0.0.0:6650",
        "--admin-addr",
        "0.0.0.0:50051",
        "--raft-addr",
        "0.0.0.0:7650",
        "--prom-exporter",
        "0.0.0.0:9040",
        "--advertised-addr",
        "danube-broker:6650",
      ]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9040/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Topic Initialization - Creates schema and topic with validation
  topic-init:
    image: ghcr.io/danube-messaging/danube-admin:latest
    container_name: qdrant-topic-init
    depends_on:
      danube-broker:
        condition: service_healthy
    environment:
      - DANUBE_ADMIN_ENDPOINT=http://danube-broker:50051
    volumes:
      # Mount schema definition file
      - ./embeddings-schema.json:/schemas/embeddings-schema.json:ro
    networks:
      - qdrant-network
    entrypoint:
      - sh
      - -ec
      - |
        echo 'Waiting for Danube broker to be ready...'
        sleep 5

        echo 'Registering schema: embeddings-v1...'
        danube-admin schemas register embeddings-v1 --schema-type json_schema --file /schemas/embeddings-schema.json

        echo 'Verifying schema registration...'
        danube-admin schemas get --subject embeddings-v1

        echo 'Ensuring topic /default/vectors exists with schema validation...'
        if danube-admin topics describe /default/vectors >/dev/null 2>&1; then
          echo 'Topic /default/vectors already exists'
        else
          danube-admin topics create /default/vectors --dispatch-strategy reliable --schema-subject embeddings-v1
        fi

        echo 'Verifying topic schema configuration...'
        danube-admin topics describe /default/vectors

        echo 'Schema and topic initialization complete'
    restart: "no"

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333" # HTTP API
      - "6334:6334" # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - qdrant-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "timeout 5s bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # Qdrant Sink Connector
  qdrant-sink:
    build:
      context: ../../
      dockerfile: sink-qdrant/Dockerfile
    container_name: qdrant-sink
    depends_on:
      topic-init:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy
    volumes:
      # Mount the connector configuration file
      - ./connector.toml:/etc/connector.toml:ro
    environment:
      # Configuration file path (required)
      - CONNECTOR_CONFIG_PATH=/etc/connector.toml

      # Core Danube settings (override values in connector.toml)
      - DANUBE_SERVICE_URL=http://danube-broker:6650
      - CONNECTOR_NAME=qdrant-sink-example

      # Qdrant connection (override for different environments)
      - QDRANT_URL=http://qdrant:6334

      # Secrets (if using Qdrant Cloud, uncomment and set)
      # - QDRANT_API_KEY=${QDRANT_API_KEY}

      # Logging
      - RUST_LOG=info,danube_sink_qdrant=debug
    ports:
      - "9090:9090" # Metrics
    networks:
      - qdrant-network
    restart: unless-stopped

  embeddings-generator:
    build:
      context: .
      dockerfile: Dockerfile.tools
    profiles:
      - tools
    working_dir: /workspace
    entrypoint:
      - python3
      - generate_embeddings.py
    environment:
      - HF_HOME=/models/huggingface
    volumes:
      - .:/workspace
      - hf_cache:/models/huggingface
    networks:
      - qdrant-network
    restart: "no"

  test-producer:
    build:
      context: .
      dockerfile: Dockerfile.tools
    profiles:
      - tools
    depends_on:
      topic-init:
        condition: service_completed_successfully
    working_dir: /workspace
    entrypoint:
      - python3
      - test_producer.py
    environment:
      - DANUBE_URL=${DANUBE_URL:-http://danube-broker:6650}
      - TOPIC=${TOPIC:-/default/vectors}
      - EMBEDDINGS_FILE=${EMBEDDINGS_FILE:-embeddings.jsonl}
      - INTERVAL=${INTERVAL:-500}
      - SCHEMA_SUBJECT=${SCHEMA_SUBJECT:-embeddings-v1}
      - PRODUCER_NAME=${PRODUCER_NAME:-test_producer}
    volumes:
      - .:/workspace
    networks:
      - qdrant-network
    restart: "no"

  vector-search:
    build:
      context: .
      dockerfile: Dockerfile.tools
    profiles:
      - tools
    depends_on:
      qdrant:
        condition: service_healthy
    working_dir: /workspace
    entrypoint:
      - python3
      - search_vectors.py
    environment:
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - HF_HOME=/models/huggingface
    volumes:
      - .:/workspace
      - hf_cache:/models/huggingface
    networks:
      - qdrant-network
    restart: "no"

networks:
  qdrant-network:
    driver: bridge

volumes:
  broker_data:
  qdrant_storage:
  hf_cache:
