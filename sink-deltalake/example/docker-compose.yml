services:
  # Danube Broker
  danube-broker:
    image: ghcr.io/danube-messaging/danube-broker:latest
    container_name: danube-broker
    restart: on-failure
    ports:
      - "6650:6650" # Danube service port
      - "50051:50051" # Admin API
      - "9040:9040" # Prometheus metrics
    environment:
      - RUST_LOG=danube_broker=info,danube_core=info,openraft=warn
    volumes:
      - ../../example_shared/danube_broker_no_auth.yml:/etc/danube_broker.yml:ro
      - broker_data:/danube-data
    networks:
      - deltalake-network
    command:
      [
        "--config-file",
        "/etc/danube_broker.yml",
        "--broker-addr",
        "0.0.0.0:6650",
        "--admin-addr",
        "0.0.0.0:50051",
        "--raft-addr",
        "0.0.0.0:7650",
        "--prom-exporter",
        "0.0.0.0:9040",
        "--advertised-addr",
        "danube-broker:6650",
      ]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9040/metrics || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Topic Initialization - Creates schema and topic with validation
  topic-init:
    image: ghcr.io/danube-messaging/danube-admin:latest
    container_name: deltalake-topic-init
    depends_on:
      danube-broker:
        condition: service_healthy
    environment:
      - DANUBE_ADMIN_ENDPOINT=http://danube-broker:50051
    volumes:
      # Mount schema definition file
      - ./events-schema.json:/schemas/events-schema.json:ro
    networks:
      - deltalake-network
    entrypoint:
      - sh
      - -ec
      - |
        echo 'Waiting for Danube broker to be ready...'
        sleep 5
        
        echo 'Registering schema: events-schema-v1...'
        danube-admin schemas register events-schema-v1 --schema-type json_schema --file /schemas/events-schema.json

        echo 'Verifying schema registration...'
        danube-admin schemas get --subject events-schema-v1
        
        recreate_topic() {
          if danube-admin topics delete /default/events; then
            echo 'Deleted stale topic /default/events'
          else
            echo 'Topic delete skipped; continuing with recreation'
          fi
          if danube-admin topics create /default/events --dispatch-strategy reliable --schema-subject events-schema-v1; then
            echo 'Recreated topic /default/events'
          else
            echo 'Topic create skipped; attempting schema configuration on existing topic'
            danube-admin topics configure-schema /default/events --subject events-schema-v1
          fi
        }

        echo 'Ensuring topic /default/events exists with schema validation...'
        if topic_info="$$(danube-admin topics describe /default/events --output json 2>/dev/null)"; then
          echo 'Topic /default/events already exists'
          if printf '%s' "$$topic_info" | grep -q '"broker_id": ""'; then
            echo 'Topic /default/events is unassigned; recreating it'
            recreate_topic
          elif printf '%s' "$$topic_info" | grep -q '"delivery": "NonReliable"'; then
            echo 'Topic /default/events is non-reliable; recreating it'
            recreate_topic
          elif ! printf '%s' "$$topic_info" | grep -q '"schema_subject": "events-schema-v1"'; then
            echo 'Configuring schema for existing topic /default/events'
            danube-admin topics configure-schema /default/events --subject events-schema-v1
          fi
        else
          danube-admin topics create /default/events --dispatch-strategy reliable --schema-subject events-schema-v1
        fi

        echo 'Verifying topic schema configuration...'
        danube-admin topics describe /default/events
        
        echo 'Schema and topic initialization complete'
    restart: "no"

  # MinIO - S3-compatible object storage
  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    networks:
      - deltalake-network
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO Client - Create bucket on startup
  minio-init:
    image: quay.io/minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - deltalake-network
    entrypoint: >
      sh -c "
        mc alias set myminio http://minio:9000 minioadmin minioadmin;
        mc mb myminio/delta-tables --ignore-existing;
        echo 'MinIO bucket created: delta-tables';
      "
    restart: "no"

  # Delta Lake Sink Connector
  deltalake-sink:
    build:
      context: ../../
      dockerfile: sink-deltalake/Dockerfile
    container_name: deltalake-sink
    depends_on:
      topic-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    volumes:
      # Mount the connector configuration file
      - ./connector.toml:/etc/connector.toml:ro
    environment:
      # Configuration file path (required)
      - CONNECTOR_CONFIG_PATH=/etc/connector.toml

      # Core Danube settings (override values in connector.toml)
      - DANUBE_SERVICE_URL=http://danube-broker:6650
      - CONNECTOR_NAME=deltalake-sink-example

      # MinIO/S3 credentials (secrets)
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin

      # S3 endpoint override for MinIO
      - S3_ENDPOINT=http://minio:9000

      # Logging
      - RUST_LOG=info,danube_sink_deltalake=debug
    ports:
      - "9090:9090" # Metrics
    networks:
      - deltalake-network
    restart: unless-stopped

  test-producer:
    build:
      context: .
      dockerfile: Dockerfile.tools
    profiles:
      - tools
    depends_on:
      topic-init:
        condition: service_completed_successfully
    working_dir: /workspace
    entrypoint:
      - python3
      - test_producer.py
    environment:
      - DANUBE_URL=${DANUBE_URL:-http://danube-broker:6650}
      - TOPIC=${TOPIC:-/default/events}
      - COUNT=${COUNT:-10}
      - INTERVAL=${INTERVAL:-500}
      - SCHEMA_SUBJECT=${SCHEMA_SUBJECT:-events-schema-v1}
      - PRODUCER_NAME=${PRODUCER_NAME:-test_producer}
      - RAW_MESSAGE=${RAW_MESSAGE:-}
    volumes:
      - .:/workspace
    networks:
      - deltalake-network
    restart: "no"

networks:
  deltalake-network:
    driver: bridge

volumes:
  broker_data:
  minio_data:
